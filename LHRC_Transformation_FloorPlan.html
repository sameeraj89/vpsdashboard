<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPS Lakeshore — Transformation Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #07090f;
  --surface:  #0d1120;
  --surface2: #111827;
  --border:   #1a2235;
  --border2:  #243048;
  --text:     #d8dff0;
  --muted:    #5a6480;
  --accent:   #4f8ef7;
  --purple:   #a78bfa;
  --green:    #34d399;
  --orange:   #fb923c;
  --gold:     #f0b429;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  padding: 48px 40px 28px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 34px;
  font-weight: 400;
  background: linear-gradient(135deg, #e8eeff 0%, #a78bfa 55%, #f472b6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.header-sub {
  font-size: 12.5px;
  color: var(--muted);
  letter-spacing: 0.3px;
}

/* ── TABS ── */
.tab-wrap {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 28px 32px 0;
}
.tab-btn {
  padding: 10px 32px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.22s;
  background: var(--surface);
  color: var(--muted);
  letter-spacing: 0.2px;
}
.tab-btn:hover { border-color: var(--accent); color: var(--text); }
.tab-btn.active {
  background: linear-gradient(135deg, #1a2f5e, #2a1a4a);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 4px 20px rgba(79,142,247,0.18);
}

/* ── CANVAS ── */
.canvas {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 0;
  padding: 32px 40px 48px;
  flex-wrap: wrap;
}

/* ── BUILDING COLUMN ── */
.building {
  display: flex;
  flex-direction: column;
  width: 360px;
}
.bldg-header {
  text-align: center;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.bldg-name {
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  color: #e8eeff;
  margin-bottom: 3px;
}
.bldg-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* ── DIVIDER ── */
.divider {
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--border2) 20%, var(--border2) 80%, transparent);
  margin: 0 32px;
  align-self: stretch;
  margin-top: 60px;
}

/* ── FLOOR ROW ── */
.floor {
  display: flex;
  align-items: stretch;
  margin-bottom: 3px;
  border-radius: 6px;
  overflow: hidden;
}
.floor-label {
  width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  color: #6b7394;
  background: rgba(13,17,32,0.8);
  border-right: 1px solid rgba(30,39,64,0.4);
  flex-shrink: 0;
  letter-spacing: 0.3px;
}
.floor-block {
  flex: 1;
  display: flex;
  align-items: center;
  padding: 9px 13px;
  min-height: 44px;
  position: relative;
  transition: filter 0.15s;
}
.floor-block:hover { filter: brightness(1.12); }
.floor-block.empty {
  background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.07);
}
.floor-name {
  font-size: 11.5px;
  font-weight: 600;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  line-height: 1.4;
}

/* ── COLOUR PALETTE — Old Building ── */
.ob-radiology   { background: linear-gradient(135deg,#1d4ed8,#1e40af); }
.ob-opd         { background: linear-gradient(135deg,#2563eb,#1d4ed8); }
.ob-ot-icu      { background: linear-gradient(135deg,#ea580c,#c2410c); }
.ob-ip          { background: linear-gradient(135deg,#4f46e5,#3730a3); }
.ob-na          { background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.08); }

/* ── COLOUR PALETTE — New Building ── */
.nb-radiation   { background: linear-gradient(135deg,#a21caf,#86198f); }
.nb-opd         { background: linear-gradient(135deg,#0284c7,#0369a1); }
.nb-er          { background: linear-gradient(135deg,#b91c1c,#991b1b); }
.nb-cafe        { background: linear-gradient(135deg,#374151,#1f2937); }
.nb-onc         { background: linear-gradient(135deg,#be185d,#9d174d); }
.nb-hn          { background: linear-gradient(135deg,#d97706,#b45309); }
.nb-cardio      { background: linear-gradient(135deg,#dc2626,#b91c1c); }
.nb-gastro      { background: linear-gradient(135deg,#0f766e,#134e4a); }
.nb-icu-ip      { background: linear-gradient(135deg,#4f46e5,#3730a3); }
.nb-ip          { background: linear-gradient(135deg,#6366f1,#4f46e5); }
.nb-nephro      { background: linear-gradient(135deg,#0891b2,#0e7490); }
.nb-ortho       { background: linear-gradient(135deg,#16a34a,#15803d); }
.nb-mother      { background: linear-gradient(135deg,#db2777,#be185d); }
.nb-bmt         { background: linear-gradient(135deg,#7c3aed,#6d28d9); }
.nb-research    { background: linear-gradient(135deg,#0e7490,#0c4a6e); }
.nb-back        { background: linear-gradient(135deg,#374151,#1f2937); }
.nb-lab         { background: linear-gradient(135deg,#1f2937,#111827); }
.nb-mrd         { background: linear-gradient(135deg,#292524,#1c1917); }
.nb-neuro       { background: linear-gradient(135deg,#0369a1,#075985); }

/* ── LEGEND ── */
.legend-wrap {
  display: flex;
  justify-content: center;
  padding: 0 40px 40px;
}
.legend-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 22px;
  max-width: 780px;
  width: 100%;
}
.legend-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.legend-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 18px;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.legend-label { font-size: 10.5px; color: #8892b0; }

@media (max-width: 860px) {
  .canvas { flex-direction: column; align-items: center; gap: 32px; }
  .divider { width: 80%; height: 1px; margin: 0 auto; background: linear-gradient(to right, transparent, var(--border2), transparent); align-self: auto; margin-top: 0; }
  .building { width: 100%; max-width: 400px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>VPS Lakeshore Hospital</h1>
  <div class="header-sub">Kochi, Kerala &nbsp;·&nbsp; Old Building + New Building &nbsp;·&nbsp; Current & Future State</div>
</div>

<div class="tab-wrap">
  <button class="tab-btn active" onclick="setView('current')">Current State</button>
  <button class="tab-btn"        onclick="setView('future')">Future State</button>
</div>

<div class="canvas" id="canvas"></div>

<div class="legend-wrap">
  <div class="legend-box">
    <div class="legend-title" id="legendTitle">Legend</div>
    <div class="legend-grid" id="legendGrid"></div>
  </div>
</div>

<script>
var data = {
  current: {
    old: [
      { label:'10F', text:'IP Beds',                          cls:'ob-ip' },
      { label:'9F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'8F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'7F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'6F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'5F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'4F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'3F',  text:'OPDs · IP Beds',                   cls:'ob-opd' },
      { label:'2F',  text:'OPD · IP Beds · ICUs',             cls:'ob-ot-icu' },
      { label:'1F',  text:'OPD · 12 OTs · ICU',               cls:'ob-ot-icu' },
      { label:'GF',  text:'Radiology · OPD (Neuro/Ortho) · Pharmacy · Reception', cls:'ob-radiology' },
      { label:'B1',  text:'—',                                cls:'ob-na' },
      { label:'B2',  text:'—',                                cls:'ob-na' },
    ],
    new: [
      { label:'10F', text:'IP Beds',                          cls:'nb-ip' },
      { label:'9F',  text:'IP Beds',                          cls:'nb-ip' },
      { label:'8F',  text:'IP Beds',                          cls:'nb-ip' },
      { label:'7F',  text:'IP Beds',                          cls:'nb-ip' },
      { label:'6F',  text:'ICU (Gastro · MD) · IP Beds',      cls:'nb-icu-ip' },
      { label:'5F',  text:'Gastro Sciences · Liver OPD',      cls:'nb-gastro' },
      { label:'4F',  text:'Cardiology',                       cls:'nb-cardio' },
      { label:'3F',  text:'Head & Neck · Health Check · ENT · Foot & Ankle', cls:'nb-hn' },
      { label:'2F',  text:'Medical Oncology · Chemo Daycare', cls:'nb-onc' },
      { label:'1F',  text:'Café',                             cls:'nb-cafe' },
      { label:'GF',  text:'PET · Reception · Billing · ER',   cls:'nb-er' },
      { label:'B1',  text:'OPD · Quality · Insurance Back Office', cls:'nb-back' },
      { label:'B2',  text:'Radiation · MRD',                  cls:'nb-radiation' },
    ]
  },
  future: {
    old: [
      { label:'10F', text:'IP Beds',                          cls:'ob-ip' },
      { label:'9F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'8F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'7F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'6F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'5F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'4F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'3F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'2F',  text:'IP Beds',                          cls:'ob-ip' },
      { label:'1F',  text:'OT · ICU · CSSD · Administration', cls:'ob-ot-icu' },
      { label:'GF',  text:'Radiology · OPD (General) · Pharmacy · Reception · Billing', cls:'ob-radiology' },
      { label:'B1',  text:'—',                                cls:'ob-na' },
      { label:'B2',  text:'—',                                cls:'ob-na' },
    ],
    new: [
      { label:'10F', text:'Clinical Research',                cls:'nb-research' },
      { label:'9F',  text:'BMT · OPDs',                       cls:'nb-bmt' },
      { label:'8F',  text:'Mother & Child',                   cls:'nb-mother' },
      { label:'7F',  text:'Ortho & ICUs',                     cls:'nb-ortho' },
      { label:'6F',  text:'Nephrology & Dialysis',            cls:'nb-nephro' },
      { label:'5F',  text:'Gastro Sciences · Liver OPD',      cls:'nb-gastro' },
      { label:'4F',  text:'Cardiac Sciences',                 cls:'nb-cardio' },
      { label:'3F',  text:'Neurosciences · ENT · Head & Neck',cls:'nb-neuro' },
      { label:'2F',  text:'Medical Oncology · Chemo Daycare', cls:'nb-onc' },
      { label:'1F',  text:'Café',                             cls:'nb-cafe' },
      { label:'GF',  text:'PET · Reception · Billing · OPDs', cls:'nb-er' },
      { label:'B1',  text:'Laboratory · Back Office · Administration · Rehab & Physio', cls:'nb-lab' },
      { label:'B2',  text:'Radiation (incl. LINAC Upgrade) · MRD',cls:'nb-radiation' },
    ]
  }
};

var legends = {
  current: [
    { cls:'ob-radiology', l:'Radiology / OPD (Old Bldg)' },
    { cls:'ob-ot-icu',    l:'OT / ICU (Old Bldg)' },
    { cls:'ob-ip',        l:'IP Beds (Old Bldg)' },
    { cls:'nb-radiation', l:'Radiation / MRD' },
    { cls:'nb-er',        l:'PET / ER / Reception' },
    { cls:'nb-onc',       l:'Medical Oncology' },
    { cls:'nb-hn',        l:'Head & Neck / ENT' },
    { cls:'nb-cardio',    l:'Cardiology' },
    { cls:'nb-gastro',    l:'Gastro Sciences' },
    { cls:'nb-icu-ip',    l:'ICU / IP Beds (New Bldg)' },
    { cls:'nb-back',      l:'Back Office / OPD' },
    { cls:'nb-cafe',      l:'Café / Services' },
  ],
  future: [
    { cls:'ob-radiology', l:'Radiology / OPD (Old Bldg)' },
    { cls:'ob-ot-icu',    l:'OT / ICU / CSSD (Old Bldg)' },
    { cls:'ob-ip',        l:'IP Beds (Old Bldg)' },
    { cls:'nb-radiation', l:'Radiation incl. LINAC Upgrade' },
    { cls:'nb-er',        l:'PET / Reception / OPDs' },
    { cls:'nb-onc',       l:'Medical Oncology' },
    { cls:'nb-neuro',     l:'Neurosciences / ENT / H&N' },
    { cls:'nb-cardio',    l:'Cardiac Sciences' },
    { cls:'nb-gastro',    l:'Gastro Sciences' },
    { cls:'nb-nephro',    l:'Nephrology & Dialysis' },
    { cls:'nb-ortho',     l:'Ortho & ICUs' },
    { cls:'nb-mother',    l:'Mother & Child' },
    { cls:'nb-bmt',       l:'BMT / OPDs' },
    { cls:'nb-research',  l:'Clinical Research' },
    { cls:'nb-lab',       l:'Lab / Admin / Rehab' },
    { cls:'nb-cafe',      l:'Café / Services' },
  ]
};

function buildBuilding(floors, title, tag) {
  var h = '<div class="bldg-header"><div class="bldg-name">'+title+'</div><div class="bldg-tag">'+tag+'</div></div>';
  floors.forEach(function(f) {
    var isEmpty = f.text === '—';
    h += '<div class="floor">';
    h += '<div class="floor-label">'+f.label+'</div>';
    h += '<div class="floor-block '+(isEmpty ? 'empty' : f.cls)+'">';
    if (!isEmpty) h += '<div class="floor-name">'+f.text+'</div>';
    h += '</div></div>';
  });
  return h;
}

function setView(v) {
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active', ['current','future'][i] === v);
  });

  var d = data[v];
  document.getElementById('canvas').innerHTML =
    '<div class="building">'+buildBuilding(d.old, 'Old Building', v === 'current' ? 'Existing State' : 'Future State')+'</div>'+
    '<div class="divider"></div>'+
    '<div class="building">'+buildBuilding(d.new, 'New Building', v === 'current' ? 'Existing State' : 'Future State')+'</div>';

  var lg = legends[v];
  document.getElementById('legendTitle').textContent = v === 'current' ? 'Current State — Legend' : 'Future State — Legend';
  document.getElementById('legendGrid').innerHTML = lg.map(function(i){
    return '<div class="legend-item"><div class="legend-swatch '+i.cls+'"></div><span class="legend-label">'+i.l+'</span></div>';
  }).join('');
}

setView('current');
</script>
</body>
</html>
